<!-- ==========================================
     PART 6.4
     SHANTO CHARACTER ANIMATION LAYER
========================================== -->


<!-- =========================
     BLINKING EYES
========================= -->

<style>

@keyframes blink {

0%,90%,100%{
transform:scaleY(1);
}

95%{
transform:scaleY(.15);
}

}


@keyframes hairMove {

0%,100%{
transform:rotate(0deg);
}

50%{
transform:rotate(3deg);
}

}


@keyframes roseMove {

0%,100%{
transform:rotate(0deg);
}

50%{
transform:rotate(-8deg);
}

}


@keyframes bouquetFloat {

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

}


@keyframes heartFloat {

0%{
opacity:0;
transform:translateY(0);
}

30%{
opacity:1;
}

100%{
opacity:0;
transform:translateY(-60px);
}

}


@keyframes glowPulse {

0%,100%{
opacity:.05;
}

50%{
opacity:.18;
}

}



#eyes{
animation:blink 4s infinite;
transform-origin:center;
}


#hair{
animation:hairMove 3s infinite ease-in-out;
transform-origin:center;
}


#rose{
animation:roseMove 2s infinite ease-in-out;
transform-origin:center;
}


#bouquet{
animation:bouquetFloat 3s infinite ease-in-out;
transform-origin:center;
}


#finalGlow{
animation:glowPulse 3s infinite;
}


.heartParticle{
animation:heartFloat 4s infinite;
transform-origin:center;
}


</style>




<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 300 500">

    <defs>

        <linearGradient id="stem"
                        x1="0%"
                        y1="0%"
                        x2="0%"
                        y2="100%">

            <stop offset="0%"
                  stop-color="#6fe36f"/>

            <stop offset="100%"
                  stop-color="#1f8f42"/>

        </linearGradient>

        <radialGradient id="petal">

            <stop offset="0%"
                  stop-color="#ffffff"/>

            <stop offset="100%"
                  stop-color="#ffe7ef"/>

        </radialGradient>

    </defs>

    <!-- Stem -->

    <rect
        x="146"
        y="180"
        width="8"
        height="250"
        rx="5"
        fill="url(#stem)" />

    <!-- Leaves -->

    <path
        d="
        M150 250
        C100 220
        90 270
        145 290
        Z"
        fill="#39a54a"/>

    <path
        d="
        M150 320
        C205 290
        215 340
        155 360
        Z"
        fill="#3fb34f"/>

    <!-- Petal 1 -->

    <ellipse
        cx="150"
        cy="120"
        rx="28"
        ry="70"
        fill="url(#petal)"
        transform="rotate(0 150 120)" />

    <!-- Petal 2 -->

    <ellipse
        cx="150"
        cy="120"
        rx="28"
        ry="70"
        fill="url(#petal)"
        transform="rotate(60 150 120)" />

    <!-- Petal 3 -->

    <ellipse
        cx="150"
        cy="120"
        rx="28"
        ry="70"
        fill="url(#petal)"
        transform="rotate(120 150 120)" />

    <!-- Petal 4 -->

    <ellipse
        cx="150"
        cy="120"
        rx="28"
        ry="70"
        fill="url(#petal)"
        transform="rotate(180 150 120)" />

    <!-- Petal 5 -->

    <ellipse
        cx="150"
        cy="120"
        rx="28"
        ry="70"
        fill="url(#petal)"
        transform="rotate(240 150 120)" />

    <!-- Petal 6 -->

    <ellipse
        cx="150"
        cy="120"
        rx="28"
        ry="70"
        fill="url(#petal)"
        transform="rotate(300 150 120)" />

    <!-- Center -->

    <circle
        cx="150"
        cy="120"
        r="12"
        fill="#ffd54f"/>

    <!-- Stamens -->

    <line
        x1="150"
        y1="120"
        x2="140"
        y2="75"
        stroke="#ff9800"
        stroke-width="2"/>

    <line
        x1="150"
        y1="120"
        x2="160"
        y2="75"
        stroke="#ff9800"
        stroke-width="2"/>

    <circle
        cx="140"
        cy="73"
        r="3"
        fill="#ff9800"/>

    <circle
        cx="160"
        cy="73"
        r="3"
        fill="#ff9800"/>

</svg>

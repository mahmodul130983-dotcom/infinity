<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 320 320">

<defs>

<radialGradient id="skin"
cx="50%"
cy="40%">

<stop offset="0%" stop-color="#ffd9b3"/>
<stop offset="100%" stop-color="#efbf96"/>

</radialGradient>

<linearGradient id="hair"
x1="0%"
y1="0%"
x2="0%"
y2="100%">

<stop offset="0%" stop-color="#2f2f2f"/>
<stop offset="100%" stop-color="#111"/>

</linearGradient>

</defs>

<!-- Face -->

<ellipse
cx="160"
